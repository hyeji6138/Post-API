<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 API 프로젝트</title>
    <link rel="stylesheet" type="text/css" th:href="@{/master.css}">
</head>
<body>
    <header>
        <h1>새 게시글 추가</h1>
    </header>
    <main>
        <form method="post">
            <table class="post-form">
                <tr>
                    <th width="20%">제목</th>
                    <td><input type="text" placeholder="제목을 입력해주세요." id="title" name="title"></td>
                </tr>
                <tr>
                    <th>내용</th>
                    <td>
                        <textarea name="content" id="titme" placeholder="내용을 입력해주세요"></textarea>
                    </td>
                </tr>
            </table>
            <div class="buttons">
                <button class="button"><a href="/post">취소</a></button>
                <input type="submit" value="추가">
            </div>
        </form>
    </main>
</body>
</html>
